services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MONGODB_URI: mongodb://mongo:27017/medvault
      JWT_SECRET: ${JWT_SECRET:-replace-this-with-a-long-random-production-secret}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      UPLOAD_DIR: ./public/uploads
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-10}
      NEXT_PUBLIC_MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-10}
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      mongo:
        condition: service_healthy
  mongo:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  mongo_data:
  uploads:
